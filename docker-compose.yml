version: '3.8'

services:
  db:
    image: postgres:16
    container_name: clothing_store_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clothing_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: clothing_store_api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8000"

  dbgate:
    image: dbgate/dbgate:latest
    container_name: clothing_store_dbgate
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      CONNECTIONS: con1
      LABEL_con1: Clothing Store DB
      SERVER_con1: db
      USER_con1: postgres
      PASSWORD_con1: postgres
      PORT_con1: 5432
      ENGINE_con1: postgres
      DATABASE_con1: clothing_store

volumes:
  postgres_data: