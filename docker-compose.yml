services:
  db:
    image: postgres:16
    container_name: clothing_store_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clothing_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d

  api:
    build: .
    container_name: clothing_store_api
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"

  dbgate:
    image: dbgate/dbgate:latest
    container_name: clothing_store_dbgate
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3000:3000"
    
volumes:
  postgres_data: